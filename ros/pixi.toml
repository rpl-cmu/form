[workspace]
authors = ["Easton Potokar <contagon6@gmail.com>"]
channels = ["robostack-jazzy", "conda-forge"]
name = "ros"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
scripts = ["install/setup.sh"]

[tasks]
build = "colcon build --event-handlers console_direct+"
oxford = "ros2 launch form odometry.launch.py bagfile:=$EVALIO_DATA/oxford_spires/blenheim_palace_01 topic:=/hesai/pandar num_rows:=64 num_columns:=1200 max_range:=60.0"

[dependencies]
ros-jazzy-ros-base = ">=0.11.0,<0.12"
ros-jazzy-ament-cmake-auto = ">=2.5.4,<3"
compilers = ">=1.11.0,<2"
pkg-config = ">=0.29.2,<0.30"
cmake = ">=4.2.3,<5"
ninja = ">=1.13.2,<2"
colcon-common-extensions = ">=0.3.0,<0.4"
ros-jazzy-gtsam = ">=4.2.0,<5"
ros-jazzy-rviz2 = ">=14.1.19,<15"
clang = ">=22.1.0,<23"
clang-tools = ">=22.1.0,<23"
